# ============================================================
# course-buddy 配置文件
# ============================================================
# 首次使用请运行 `cb init` 自动获取你的课程
# 或手动添加课程配置

# Cookie 路径（自动管理，通常不需要修改）
cookies_path: ~/.config/canvas/cookies.json
cookies_from_browser: safari

# 数据根目录
root_dir: data

# ============================================================
# 课程配置 — 运行 cb init 自动填充
# ============================================================
courses: {}

# ============================================================
# 转录设置
# ============================================================
transcribe:
  backend: whisper-cpp
  language: zh
  target_langs: [zh, en]
  clean_video: true
  clean_audio: true

# ============================================================
# LLM 设置（笔记生成）
# ============================================================
llm:
  enabled: true
  api_key_env: LLM_API_KEY
  base_url: https://aihubmix.com/v1
  model: qwen3-max
  temperature: 0.3

ask:
  llm:
    enabled: true
    model: qwen3-max
    temperature: 0
    api_key_env: LLM_API_KEY
